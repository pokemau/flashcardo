<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="styles.css">
   <title>FLASCHCARDO</title>
</head>
<body>
   <header class="title">
      <h1>FLASHCARDO</h1>
   </header>

   <section class="site-body-container">
      <div class="main-container">
         <div class="input-fields">
            <div class="def-container" 
            contenteditable="true" 
            def-placeholder="Write your question here"></div>
      
            <div class="answer-container" 
            contenteditable="true"
            ans-placeholder="Answer here"></div>

            <div class="btn-container">
               <button class="add-btn" type="button">Add Question</button>
            </div>
         </div>
      </div>

   
      <div class="question-container">
         <div class="question-bg">
            <div class="q-title">
               <h1>Questions</h1>
            </div>
      
            <div class="questions-list">
      
            </div>
         </div>
         
         <div class="startbtn-container">
            <button id="start-btn">Start Flashcard</button>
         </div>
      </div>

   </section>
   

   <script src="script.js"></script>
</body>
</html>
